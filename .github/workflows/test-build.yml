name: Test Build

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Verify RSS
        run: |
          if [ -f "public/index.xml" ]; then
            echo "✅ RSS feed generated"
            wc -l public/index.xml
          else
            echo "❌ RSS feed not found!"
            exit 1
          fi

      - name: Check HTML
        run: |
          echo "📊 HTML files: $(find public -name '*.html' | wc -l)"
          echo "📦 Size: $(du -sh public/ | cut -f1)"
          echo "🔗 RSS links: $(grep -c '<link>' public/index.xml || echo 0)"