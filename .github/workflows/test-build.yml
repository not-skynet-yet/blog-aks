name: Test Build

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Hugo Modules
        run: hugo mod tidy

      - name: Build
        run: hugo --minify

      - name: Verify RSS
        run: |
          if [ -f "public/index.xml" ]; then
            echo "✅ RSS feed generated successfully"
            wc -l public/index.xml
          else
            echo "❌ RSS feed not found!"
            exit 1
          fi

      - name: Check HTML output
        run: |
          echo "📊 Total HTML files: $(find public -name '*.html' | wc -l)"
          echo "📦 Total build size: $(du -sh public/ | cut -f1)"
          echo "🔗 Links in RSS:"
          grep -oP '<link>[^<]+' public/index.xml | head -5 || echo "No links yet (empty feed ok for new site)"
