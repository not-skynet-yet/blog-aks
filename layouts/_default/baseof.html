<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="{{ .Site.Params.author }}">
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  <meta name="keywords" content="{{ delimit .Params.tags ", " }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/png" href="/images/favicon-32x32.png" sizes="32x32">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" href="{{ "index.xml" | relURL }}" title="{{ .Site.Title }}">
  {{ partial "head.html" . }}
  <link rel="stylesheet" href="{{ "css/style.min.61a6b883261356a548717cf2f71c6a4d73154870c04c838251b78f89ba6e6809.css" | relURL }}">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a class="logo" href="{{ "/" | relURL }}">
        <img class="logo__image" src="{{ .Site.Params.avatarurl | default "/images/avatar.png" }}" alt="Logo">
        {{ .Site.Title }}
      </a>
      <div class="menu">
        {{ range .Site.Params.menu.main }}
          <a class="menu__link" href="{{ .url | relURL }}">{{ .name }}</a>
        {{ end }}
      </div>
    </div>
    {{ if .Params.tags }}
    <ul class="tags">
      {{ range .Params.tags }}
        <li class="tags__item"><a class="tags__link" href="{{ "tags/" | relURL }}{{ . | urlize }}/">{{ . }}</a></li>
      {{ end }}
    </ul>
    {{ end }}
  </header>
  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="footer">
    <div class="footer__inner">
      {{ partial "footer.html" . }}
      <div class="footer__content"><p>© 2026 Akshat Sinha. Built with Hugo.</p></div>
    </div>
  </footer>
</body>
</html>
