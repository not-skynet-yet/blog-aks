baseURL = 'https://not-skynet-yet.github.io/blog-aks/'
title = 'Prompts to Production'
languageCode = 'en-in'
defaultContentLanguage = 'en'

[params]
  author = 'Akshat Sinha'
  info = 'DevOps and AI Engineer | Building infrastructure and AI systems'
  description = 'Taking AI out of the playground and into the real world. Weekly AIOps, MLOps, infrastructure, philosophy behind safe autonomous systems.'
  avatarurl = '/images/avatar.png'
  colorScheme = 'auto'
  customCSS = ['css/custom.css']

  [[params.menu.main]]
    name = "Home"
    url = ""
    weight = 1
  [[params.menu.main]]
    name = "Posts"
    url = "posts/"
    weight = 2
  [[params.menu.main]]
    name = "Archive"
    url = "categories/"
    weight = 3

[outputs]
  home = ['html', 'rss']

[services.rss]
  limit = 50

[markup.goldmark]
  renderer.unsafe = true
[markup.highlight]
  style = 'monokai'
  lineNos = true